# Isolated compose for the ОП meeting-recording worker (own SQLite state).
#
# NOTE: the pipeline's final stage pushes scored meetings into the call
# pipeline's Postgres (`meetings` table) for the companion API. This isolated
# stack has no route to that DB, so here the push stays pending (non-fatal,
# logged) unless ATAMURAOKK_DB_HOST/PORT in .env point somewhere reachable.
# For Postgres-connected deploys prefer the `meetings-worker` service in the
# main docker-compose.yml.
#
# Usage (from the repo root):
#   docker compose -f deploy/docker-compose.meetings.yml up -d --build
#   docker compose -f deploy/docker-compose.meetings.yml logs -f
#
# Requires ffmpeg in the image: meeting sources (.m4a/.mp4/.amr …) are downmixed
# to mono OGG/Opus before upload to Yandex STT (60 MB inline cap) + duration probe.

services:
  meetings-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m AtamuraOKK.scoring.meetings.worker
    env_file:
      - ../.env
    environment:
      ATAMURAOKK_MEETINGS_WORK_DIR: /data/meetings
    volumes:
      - meetings-state:/data/meetings
    restart: unless-stopped

# Explicit name (shared with the main compose's meetings-worker) so switching
# deploy modes keeps the pipeline state.
volumes:
  meetings-state:
    name: meetings-state
