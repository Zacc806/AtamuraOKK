# Shared config for every broker role (dispatcher + stage workers). Each role is
# its own service/container so the CPU-bound transcribe pool scales independently
# from the IO-bound download/score pools. Scale a stage with, e.g.:
#   docker compose up --scale score=3 --scale download=2
x-worker-base: &worker_base
  build:
    context: .
    target: dev
    dockerfile: ./Dockerfile
  image: atamuraokk:${ATAMURAOKK_VERSION:-latest}
  restart: always
  env_file:
    - path: .env
      required: false
  environment:
    ATAMURAOKK_DB_HOST: AtamuraOKK-db
    ATAMURAOKK_DB_PORT: 5432
    ATAMURAOKK_DB_USER: AtamuraOKK
    # Sourced from .env so a prod password actually takes effect (a literal here
    # would override env_file). Falls back to the dev default when unset.
    ATAMURAOKK_DB_PASS: ${ATAMURAOKK_DB_PASS:-AtamuraOKK}
    ATAMURAOKK_DB_BASE: AtamuraOKK
    # Reach MinIO + Redis over the compose network (override any .env host:port).
    ATAMURAOKK_S3_ENDPOINT_URL: http://AtamuraOKK-minio:9000
    ATAMURAOKK_REDIS_URL: redis://AtamuraOKK-redis:6379/0
  depends_on:
    db:
      condition: service_healthy
    migrator:
      condition: service_completed_successfully
    minio:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    # Persist generated reports (.md/.docx) to the host.
    - ./reports:/app/src/reports

services:
  api: &main_app
    build:
      context: .
      target: dev
      dockerfile: ./Dockerfile
    image: atamuraokk:${ATAMURAOKK_VERSION:-latest}
    restart: always
    ports:
      # Exposes application port.
    - "8000:8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      ATAMURAOKK_HOST: 0.0.0.0
      ATAMURAOKK_RELOAD: "True"
      ATAMURAOKK_DB_HOST: AtamuraOKK-db
      ATAMURAOKK_DB_PORT: 5432
      ATAMURAOKK_DB_USER: AtamuraOKK
      ATAMURAOKK_DB_PASS: ${ATAMURAOKK_DB_PASS:-AtamuraOKK}
      ATAMURAOKK_DB_BASE: AtamuraOKK
    volumes:
      - .:/app/src/
    networks:
      # Default compose network (db/minio/redis reachable by hostname) ...
      default: {}
      # ... plus the shared bridge the sales-companion joins. The companion's
      # nginx reaches this service as http://okk-web:8000 (the alias below).
      atamura-net:
        aliases:
          - okk-web

  db:
    image: postgres:18.3-trixie
    hostname: AtamuraOKK-db
    ports:
      # Bound to loopback: the call corpus must never be reachable on a public
      # interface. Host tools (alembic, app) still use 127.0.0.1:5433; the
      # container listens on 5432 internally and app containers reach it over the
      # compose network. Drop this mapping entirely if no host-side access is needed.
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_PASSWORD: "${ATAMURAOKK_DB_PASS:-AtamuraOKK}"
      POSTGRES_USER: "AtamuraOKK"
      POSTGRES_DB: "AtamuraOKK"
    volumes:
      - AtamuraOKK-db-data:/var/lib/postgresql
      # Creates the dedicated metabaseappdb database on first volume init.
      - ./db-init:/docker-entrypoint-initdb.d:ro
    restart: always
    healthcheck:
      test: pg_isready -U AtamuraOKK
      interval: 2s
      timeout: 3s
      retries: 40

  migrator:
    <<: *main_app
    restart: "no"
    command: alembic upgrade head
    # The anchor publishes 8000 for the api; the migrator must not, or it
    # collides with the running api on any non-first `up`.
    ports: []
    depends_on:
      db:
        condition: service_healthy

  # Redis: a *transient* work-dispatch layer between the dispatcher and the stage
  # workers. Postgres stays the source of truth, so Redis runs cache-only (no
  # persistence) — the dispatcher rebuilds the queue from Postgres after a wipe.
  redis:
    image: redis:7-alpine
    hostname: AtamuraOKK-redis
    command: redis-server --save "" --appendonly no
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Singleton beat: ingestion + requalification + claim/fan-out + cron jobs
  # (reports, retry, daily summary). Run exactly one of these.
  dispatcher:
    <<: *worker_base
    command: python -m AtamuraOKK.dispatch dispatcher

  # IO-bound: fetch recordings to object storage.
  download:
    <<: *worker_base
    command: python -m AtamuraOKK.dispatch download

  # CPU-bound: ffmpeg channel split + local whisper. Keep ~1 replica (the model
  # saturates the CPU); tune throughput via ATAMURAOKK_TRANSCRIBE_CONCURRENCY.
  transcribe:
    <<: *worker_base
    command: python -m AtamuraOKK.dispatch transcribe

  # IO-bound: LLM scoring. Safe to scale out (ceiling = the LLM rate limit).
  score:
    <<: *worker_base
    command: python -m AtamuraOKK.dispatch score

  # Legacy all-in-one APScheduler worker, superseded by the dispatcher + stage
  # workers above. Kept as a single-process fallback (e.g. local dev without
  # Redis). Start with: docker compose --profile legacy up worker
  worker:
    <<: *worker_base
    command: python -m AtamuraOKK.worker
    profiles: ["legacy"]
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  # ОП meeting pipeline (scoring/meetings/): Disk ingest → Yandex STT transcribe →
  # LLM score in its own SQLite state, then push scored meetings into Postgres
  # (the `meetings` table) for the companion API. Runs on the main stack so the
  # push stage can reach AtamuraOKK-db; needs no MinIO/Redis. Supersedes the
  # isolated deploy/docker-compose.meetings.yml for Postgres-connected deploys.
  meetings-worker:
    build:
      context: .
      target: dev
      dockerfile: ./Dockerfile
    image: atamuraokk:${ATAMURAOKK_VERSION:-latest}
    restart: always
    command: python -m AtamuraOKK.scoring.meetings.worker
    env_file:
      - path: .env
        required: false
    environment:
      ATAMURAOKK_DB_HOST: AtamuraOKK-db
      ATAMURAOKK_DB_PORT: 5432
      ATAMURAOKK_DB_USER: AtamuraOKK
      ATAMURAOKK_DB_PASS: ${ATAMURAOKK_DB_PASS:-AtamuraOKK}
      ATAMURAOKK_DB_BASE: AtamuraOKK
      ATAMURAOKK_MEETINGS_WORK_DIR: /data/meetings
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    volumes:
      - meetings-state:/data/meetings

  # BI dashboard over Postgres (per-manager / per-department QA scorecards).
  metabase:
    image: metabase/metabase:latest
    hostname: AtamuraOKK-metabase
    ports:
      - "3000:3000"
    environment:
      # Metabase's internal app-db (its own metadata: users, dashboards, settings)
      # lives in a dedicated "metabaseappdb" database on the shared Postgres server.
      # This is separate from the AtamuraOKK call data Metabase analyzes, which is
      # added as a data source inside the Metabase UI. The metabaseappdb database is
      # created by db-init/01-metabase-db.sql on first Postgres volume init.
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_HOST: AtamuraOKK-db
      MB_DB_PORT: 5432
      MB_DB_USER: AtamuraOKK
      MB_DB_PASS: ${ATAMURAOKK_DB_PASS:-AtamuraOKK}
      JAVA_TIMEZONE: Asia/Qyzylorda
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # S3-compatible object storage for call recordings.
  minio:
    image: minio/minio:latest
    hostname: AtamuraOKK-minio
    command: server /data --console-address ":9001"
    ports:
      # Loopback only — object storage (recordings) is internal infra, reached by
      # the workers over the compose network as AtamuraOKK-minio:9000. The host
      # mappings are for console/admin access from the box itself.
      - "127.0.0.1:9000:9000"  # S3 API
      - "127.0.0.1:9001:9001"  # web console
    environment:
      MINIO_ROOT_USER: "${ATAMURAOKK_S3_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${ATAMURAOKK_S3_SECRET_KEY:-minioadmin}"
    volumes:
      - AtamuraOKK-minio-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20


volumes:
  AtamuraOKK-db-data:
    name: AtamuraOKK-db-data
  AtamuraOKK-minio-data:
    name: AtamuraOKK-minio-data
  # Meeting pipeline state (SQLite + downloaded audio). Name matches
  # deploy/docker-compose.meetings.yml so switching deploy modes keeps the state.
  meetings-state:
    name: meetings-state

networks:
  # Shared bridge both this stack and sales-companion join — the "marriage".
  # Create once before `up`:  docker network create atamura-net
  atamura-net:
    external: true
