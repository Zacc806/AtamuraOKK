services:
  api: &main_app
    build:
      context: .
      target: dev
      dockerfile: ./Dockerfile
    image: atamuraokk:${ATAMURAOKK_VERSION:-latest}
    restart: always
    ports:
      # Exposes application port.
    - "8000:8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      ATAMURAOKK_HOST: 0.0.0.0
      ATAMURAOKK_RELOAD: "True"
      ATAMURAOKK_DB_HOST: AtamuraOKK-db
      ATAMURAOKK_DB_PORT: 5432
      ATAMURAOKK_DB_USER: AtamuraOKK
      ATAMURAOKK_DB_PASS: AtamuraOKK
      ATAMURAOKK_DB_BASE: AtamuraOKK
    volumes:
      - .:/app/src/

  db:
    image: postgres:18.3-trixie
    hostname: AtamuraOKK-db
    ports:
      # Host 5433 to avoid clashing with other local Postgres instances; the
      # container still listens on 5432 internally. Host tools (alembic, app)
      # use ATAMURAOKK_DB_PORT=5433 (see .env).
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: "AtamuraOKK"
      POSTGRES_USER: "AtamuraOKK"
      POSTGRES_DB: "AtamuraOKK"
    volumes:
      - AtamuraOKK-db-data:/var/lib/postgresql
      # Creates the dedicated metabaseappdb database on first volume init.
      - ./db-init:/docker-entrypoint-initdb.d:ro
    restart: always
    healthcheck:
      test: pg_isready -U AtamuraOKK
      interval: 2s
      timeout: 3s
      retries: 40

  migrator:
    <<: *main_app
    restart: "no"
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  # Always-on pipeline worker: ingestion, transcription, scoring, twice-daily
  # reports, auto-recovery and the daily summary — all on one schedule.
  # Standalone (not the api anchor) so it publishes no port and won't clash.
  worker:
    build:
      context: .
      target: dev
      dockerfile: ./Dockerfile
    image: atamuraokk:${ATAMURAOKK_VERSION:-latest}
    restart: always
    command: python -m AtamuraOKK.worker
    env_file:
      - path: .env
        required: false
    environment:
      ATAMURAOKK_DB_HOST: AtamuraOKK-db
      ATAMURAOKK_DB_PORT: 5432
      ATAMURAOKK_DB_USER: AtamuraOKK
      ATAMURAOKK_DB_PASS: AtamuraOKK
      ATAMURAOKK_DB_BASE: AtamuraOKK
      # Reach MinIO over the compose network (override any .env host:port).
      ATAMURAOKK_S3_ENDPOINT_URL: http://AtamuraOKK-minio:9000
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    volumes:
      # Persist generated reports (.md/.docx) to the host.
      - ./reports:/app/src/reports

  # BI dashboard over Postgres (per-manager / per-department QA scorecards).
  metabase:
    image: metabase/metabase:latest
    hostname: AtamuraOKK-metabase
    ports:
      - "3000:3000"
    environment:
      # Metabase's internal app-db (its own metadata: users, dashboards, settings)
      # lives in a dedicated "metabaseappdb" database on the shared Postgres server.
      # This is separate from the AtamuraOKK call data Metabase analyzes, which is
      # added as a data source inside the Metabase UI. The metabaseappdb database is
      # created by db-init/01-metabase-db.sql on first Postgres volume init.
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_HOST: AtamuraOKK-db
      MB_DB_PORT: 5432
      MB_DB_USER: AtamuraOKK
      MB_DB_PASS: AtamuraOKK
      JAVA_TIMEZONE: Asia/Qyzylorda
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # S3-compatible object storage for call recordings.
  minio:
    image: minio/minio:latest
    hostname: AtamuraOKK-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    environment:
      MINIO_ROOT_USER: "${ATAMURAOKK_S3_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${ATAMURAOKK_S3_SECRET_KEY:-minioadmin}"
    volumes:
      - AtamuraOKK-minio-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20


volumes:
  AtamuraOKK-db-data:
    name: AtamuraOKK-db-data
  AtamuraOKK-minio-data:
    name: AtamuraOKK-minio-data
